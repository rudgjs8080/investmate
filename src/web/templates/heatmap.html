{% extends "base.html" %}
{% block title %}시장 히트맵{% endblock %}

{% block content %}
<nav class="text-xs text-gray-400 mb-4">
    <a href="/" class="hover:text-indigo-500">대시보드</a>
    <span class="mx-1">/</span>
    <span>시장 히트맵</span>
</nav>

<div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">S&P 500 시장 히트맵</h1>
    <div class="flex gap-2" id="period-btns">
        <button onclick="loadHeatmap('1d')" class="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-indigo-500 text-white shadow-sm" data-period="1d">1일</button>
        <button onclick="loadHeatmap('5d')" class="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300" data-period="5d">5일</button>
        <button onclick="loadHeatmap('1m')" class="px-3.5 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300" data-period="1m">1개월</button>
    </div>
</div>
<div class="flex items-center gap-2 text-xs text-gray-400 mt-2 mb-3">
    <span class="inline-block w-3 h-3 rounded bg-red-500"></span> -5%
    <span class="inline-block w-3 h-3 rounded bg-gray-400"></span> 0%
    <span class="inline-block w-3 h-3 rounded bg-emerald-500"></span> +5%
</div>

<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-2">
    <div id="heatmapChart" role="img" aria-label="S&P 500 시장 히트맵" style="height: min(70vh, 600px)"></div>
</div>

<p class="text-xs text-gray-400 mt-3 text-center">크기 = 시가총액 | 색상 = 수익률 (초록=상승, 빨강=하락) | 클릭하면 종목 상세로 이동</p>
{% endblock %}

{% block scripts %}
<script>
let heatmapChart = null;

function loadHeatmap(period) {
    // 버튼 활성화 상태 변경
    document.querySelectorAll('#period-btns button').forEach(btn => {
        if (btn.dataset.period === period) {
            btn.className = 'px-3.5 py-1.5 rounded-lg text-sm font-medium bg-indigo-500 text-white shadow-sm';
        } else {
            btn.className = 'px-3.5 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200';
        }
    });

    fetch(`/api/heatmap?period=${period}`).then(r => r.json()).then(data => {
        if (!heatmapChart) heatmapChart = initChart('heatmapChart');
        if (!heatmapChart || !data.sectors.length) return;

        // 수익률 → 색상 변환
        function retColor(r) {
            if (r >= 3) return '#16a34a';
            if (r >= 1.5) return '#22c55e';
            if (r >= 0.5) return '#4ade80';
            if (r >= 0) return '#86efac';
            if (r >= -0.5) return '#fca5a5';
            if (r >= -1.5) return '#f87171';
            if (r >= -3) return '#ef4444';
            return '#dc2626';
        }

        const treeData = data.sectors.map(sector => ({
            name: sector.name,
            children: sector.children.map(s => ({
                name: s.ticker || s.name,
                value: s.value,
                return_pct: s.return_pct,
                ticker: s.ticker,
                stock_name: s.stock_name,
                price: s.price,
                itemStyle: { color: retColor(s.return_pct) },
            })),
        }));

        heatmapChart.setOption({
            tooltip: {
                formatter: function(info) {
                    const d = info.data;
                    if (!d || !d.ticker) return info.name;
                    const color = d.return_pct > 0 ? '#10b981' : d.return_pct < 0 ? '#ef4444' : '#6b7280';
                    return `<div style="font-size:13px">
                        <strong>${d.ticker}</strong> ${d.stock_name}<br/>
                        <span style="color:${color}; font-weight:700; font-size:15px">${d.return_pct > 0 ? '+' : ''}${d.return_pct}%</span><br/>
                        $${d.price.toLocaleString(undefined, {minimumFractionDigits:2})}<br/>
                        시총 $${d.value.toFixed(0)}B
                    </div>`;
                },
                backgroundColor: 'rgba(15,23,42,0.95)',
                borderColor: 'rgba(99,102,241,0.3)',
                textStyle: { color: '#e2e8f0' },
                extraCssText: 'border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.3)',
            },
            series: [{
                type: 'treemap',
                data: treeData,
                roam: false,
                nodeClick: false,
                breadcrumb: { show: true, top: 4, itemStyle: { color: '#f1f5f9', textStyle: { color: '#64748b', fontSize: 11 } } },
                levels: [
                    { // 섹터
                        itemStyle: { borderWidth: 2, borderColor: '#fff', gapWidth: 2 },
                        upperLabel: { show: true, height: 24, fontSize: 12, fontWeight: 600, color: '#334155', backgroundColor: 'rgba(241,245,249,0.9)', padding: [4, 8] },
                    },
                    { // 종목
                        itemStyle: { borderWidth: 1, borderColor: 'rgba(255,255,255,0.3)', gapWidth: 1 },
                        label: { show: true, fontSize: 10, formatter: function(p) { return p.data.ticker ? p.data.ticker + '\n' + (p.data.return_pct > 0 ? '+' : '') + p.data.return_pct + '%' : p.name; }, color: '#fff', textShadowColor: 'rgba(0,0,0,0.5)', textShadowBlur: 3 },
                    },
                ],
                visualMin: -5,
                visualMax: 5,
                color: ['#dc2626', '#ef4444', '#f87171', '#fca5a5', '#d1d5db', '#86efac', '#4ade80', '#22c55e', '#16a34a'],
                leafDepth: 2,
                label: { show: true },
            }],
            animationDuration: 1000,
        });

        // 클릭 시 종목 상세로 이동
        heatmapChart.on('click', function(params) {
            if (params.data && params.data.ticker) {
                window.location.href = '/stock/' + params.data.ticker;
            }
        });
    }).catch(e => console.error('Heatmap error:', e));
}

// 초기 로드
loadHeatmap('1d');
</script>
{% endblock %}
