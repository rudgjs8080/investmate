<!-- Chat Component -->
<style>
#chat-toggle {
    position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px;
    border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; border: none; font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(99,102,241,0.4); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
#chat-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(99,102,241,0.5); }

#chat-panel {
    position: fixed; bottom: 86px; right: 24px; width: 380px; max-height: 500px;
    background: white; border: 1px solid #e2e8f0; border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15); z-index: 999;
    display: none; flex-direction: column; overflow: hidden;
}
.dark #chat-panel { background: #1e293b; border-color: #334155; }
#chat-panel.open { display: flex; }

#chat-header {
    padding: 12px 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; font-weight: 600; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
}
#chat-header button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; width: auto; }

#chat-messages { flex: 1; overflow-y: auto; padding: 12px; max-height: 320px; }

.chat-msg {
    margin-bottom: 10px; padding: 8px 12px; border-radius: 12px;
    max-width: 85%; word-wrap: break-word; font-size: 13px; line-height: 1.5;
}
.chat-msg.user { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
.chat-msg.ai { background: #f1f5f9; color: #334155; margin-right: auto; border-bottom-left-radius: 4px; }
.dark .chat-msg.ai { background: #334155; color: #e2e8f0; }
.chat-msg.ai pre { white-space: pre-wrap; margin: 0; font-family: inherit; font-size: inherit; }
.chat-msg.error { background: #fee2e2; color: #991b1b; margin-right: auto; border-bottom-left-radius: 4px; }

#chat-suggestions { padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #e2e8f0; }
.dark #chat-suggestions { border-color: #334155; }
#chat-suggestions button {
    font-size: 11px; padding: 4px 10px; border-radius: 16px; cursor: pointer;
    background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; transition: all 0.15s;
}
.dark #chat-suggestions button { background: #334155; border-color: #475569; color: #94a3b8; }
#chat-suggestions button:hover { background: #6366f1; color: white; border-color: #6366f1; }

#chat-input-area {
    padding: 10px 12px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: center;
}
.dark #chat-input-area { border-color: #334155; }
#chat-input-area input {
    flex: 1; margin: 0; padding: 8px 14px; font-size: 13px; border-radius: 20px;
    border: 1px solid #e2e8f0; outline: none; transition: border-color 0.15s;
}
.dark #chat-input-area input { background: #1e293b; border-color: #334155; color: #e2e8f0; }
#chat-input-area input:focus { border-color: #6366f1; }
#chat-input-area button {
    margin: 0; padding: 8px 16px; width: auto; background: #6366f1; color: white;
    border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
}
#chat-input-area button:hover { opacity: 0.9; }
#chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

#chat-loading { text-align: center; padding: 8px; color: #94a3b8; font-size: 12px; display: none; }

@media (max-width: 480px) { #chat-panel { width: calc(100vw - 32px); right: 16px; bottom: 80px; } }
</style>

<button id="chat-toggle" onclick="toggleChat()" title="AI 채팅">💬</button>

<div id="chat-panel">
    <div id="chat-header">
        <span>🤖 AI 투자 상담</span>
        <button onclick="toggleChat()">✕</button>
    </div>
    <div id="chat-messages">
        <div class="chat-msg ai">안녕하세요! 투자 분석에 대해 질문해주세요.</div>
    </div>
    <div id="chat-suggestions">
        <button onclick="sendSuggestion('시장 분위기 어때?')">🌍 시장 분위기</button>
        <button onclick="sendSuggestion('오늘 추천 종목 설명해줘')">📊 추천 종목</button>
        <button onclick="sendSuggestion('GOOGL 분석해줘')">🔍 GOOGL 분석</button>
    </div>
    <div id="chat-loading">⏳ AI가 분석 중입니다...</div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="질문을 입력하세요..." onkeypress="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">전송</button>
    </div>
</div>

<script>
let chatOpen = false;
function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-panel').classList.toggle('open', chatOpen);
    if (chatOpen) document.getElementById('chat-input').focus();
}
function sendSuggestion(text) { document.getElementById('chat-input').value = text; sendChat(); }
async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMessage(msg, 'user');
    const loading = document.getElementById('chat-loading');
    const sendBtn = document.querySelector('#chat-input-area button');
    loading.style.display = 'block';
    sendBtn.disabled = true;
    try {
        const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: msg}) });
        const data = await res.json();
        addMessage(data.error || data.response, data.error ? 'error' : 'ai');
    } catch (e) { addMessage('네트워크 오류가 발생했습니다.', 'error'); }
    finally { loading.style.display = 'none'; sendBtn.disabled = false; }
}
function addMessage(text, type) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    if (type === 'ai') { const pre = document.createElement('pre'); pre.textContent = text; div.appendChild(pre); }
    else { div.textContent = text; }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}
</script>
